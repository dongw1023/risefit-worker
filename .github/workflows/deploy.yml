name: Build, Push, and Update Infrastructure File

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west2
  REPOSITORY: risefit-worker
  SERVICE_NAME: risefit-worker
  INFRA_REPO: dongw1023/risefit-infra

jobs:
  build-and-update-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v3

      # Authenticate to Google Cloud
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Configure Docker
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # Build and Push image, using commit SHA as the tag
      - name: Build and Push Docker Image
        id: docker_build
        run: |
          docker build -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" .
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          # Modern syntax for setting outputs
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Checkout Infrastructure Repo
        uses: actions/checkout@v3
        with:
          repository: ${{ env.INFRA_REPO }}
          path: risefit-infra
          ssh-key: ${{ secrets.INFRA_DEPLOY_KEY }}

      - name: Update and Commit Infrastructure Configuration
        run: |
          # --- Configuration ---
          TARGET_ENV="staging"
          SERVICE_NAME="${{ env.SERVICE_NAME }}"
          NEW_TAG="${{ steps.docker_build.outputs.image_tag }}"
          
          cd risefit-infra
          
          TF_VAR_NAME="${SERVICE_NAME//-/_}_image_tag"
          TFVARS_FILE="$TARGET_ENV/terraform.tfvars"
          
          echo "Updating $TF_VAR_NAME in $TFVARS_FILE to tag $NEW_TAG"
          
          # Use sed to safely update the variable in the .tfvars file.
          # This replaces the line starting with TF_VAR_NAME with the new value.
          sed -i "s/^$TF_VAR_NAME.*/$TF_VAR_NAME = \"$NEW_TAG\"/" "$TFVARS_FILE"
          
          echo "Updated $TFVARS_FILE content:"
          cat "$TFVARS_FILE"
          
          # Git configuration and push
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
          git add "$TFVARS_FILE"
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update $SERVICE_NAME image in $TARGET_ENV to $NEW_TAG"
            git push
          fi
